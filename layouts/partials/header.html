<header class="site-header">
  <nav>
    <a class="site-name" href="{{ "/" | relURL }}">{{ site.Title }}</a>
    <ul>
      {{- range site.Menus.main }}
      <li>
        <a href="{{ .URL }}"{{- if $.IsMenuCurrent "main" . }} class="active"{{- end }}>{{ .Name }}</a>
      </li>
      {{- end }}
    </ul>
  </nav>
</header>
