{{ define "main" }}
<section>
  {{- range $i, $p := .Pages }}
  <div class="list-item">
    <span class="idx">{{ printf "%02d" (add $i 1) }}</span>
    {{- if not $p.Date.IsZero }}
    <time datetime="{{ $p.Date.Format "2006-01-02" }}">{{ $p.Date.Format "Jan 2006" }}</time>
    {{- end }}
    <a href="{{ $p.Permalink }}">{{ $p.Title }}</a>
  </div>
  {{- end }}
</section>
{{ end }}
